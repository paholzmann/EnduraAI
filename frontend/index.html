<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EndurAI</title>
    <link rel="stylesheet" href="./styles/index.css">
</head>
<body>
    <h1>Race Effort Calculator</h1>
    <form id="race-effort-form">
        <label for="distance_km">Distance (km)</label>
        <input type="number" id="distance_km" name="distance_km" step="0.1" required>

        <label for="elevation_gain">Elevation gain (m+)</label>
        <input type="number" id="elevation_gain" name="elevation_gain" step="1" required>
        <button type="submit">Calculate</button>
    </form>

    <section id="result">
        <h2>Result</h2>
        <p id="result-text">Nothing calculatet yet.</p>
    </section>
    <script src="./components/index.js"></script>
</body>
</html>
