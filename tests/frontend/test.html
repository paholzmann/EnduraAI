<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="test.css">
</head>
<body>
<section class="card race-opportunities">
    <div class="table-header">
        <div>
            <p class="eyebrow">Performance Projection</p>
            <h2>Best Race Opportunities</h2>
            <p>Races where your current performance would likely rank strongest.</p>
        </div>

        <button class="button-secondary">Export</button>
    </div>

    <div class="table-toolbar">
        <input id="raceSearch" type="search" placeholder="Search races...">
        <select id="categoryFilter">
            <option value="all">All categories</option>
            <option value="50K">50K</option>
            <option value="100K">100K</option>
            <option value="100M">100M</option>
        </select>
    </div>

    <div class="table-wrapper">
        <table class="race-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Race</th>
                    <th>Category</th>
                    <th>Distance</th>
                    <th>Elevation</th>
                    <th>Projected Place</th>
                    <th>Opportunity</th>
                    <th>Match</th>
                </tr>
            </thead>
            <tbody id="raceTableBody"></tbody>
        </table>
    </div>
</section>
    <script src="test.js"></script>
</body>
</html>
